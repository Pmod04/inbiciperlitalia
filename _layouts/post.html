---
layout: default
---

<div class="container">
  <a class="back-link" href="{{ '/' | relative_url }}">← Tutti gli articoli</a>

  <article>
    <header class="post-header">
      <div class="post-meta">
        {{ page.date | date: "%d %B %Y" }}
        {% if page.tags.size > 0 %}
          —
          {% for tag in page.tags %}
            <span class="tag">{{ tag }}</span>
          {% endfor %}
        {% endif %}
      </div>
      <h1>{{ page.title }}</h1>
      {% if page.author %}
        <p class="post-author">di <strong>{{ page.author }}</strong></p>
      {% endif %}
    </header>

    <div class="post-content" id="post-content">
      {{ content }}
    </div>
  </article>

  <!-- Galleria slideshow: viene costruita e iniettata qui da JS -->
  <div id="gallery-mount"></div>

  <a class="back-link" href="{{ '/' | relative_url }}">← Torna alla home</a>
</div>

<script>
(function () {
  var content = document.getElementById('post-content');
  var mount   = document.getElementById('gallery-mount');
  if (!content || !mount) return;

  // 1. Raccogli tutte le immagini nel post
  var imgs = Array.from(content.querySelectorAll('img'));
  if (imgs.length === 0) return;

  // Salva i dati (src, alt) prima di rimuoverle dal DOM
  var imgData = imgs.map(function(img) {
    return { src: img.src, alt: img.alt || '' };
  });

  // 2. Rimuovi le immagini dal corpo del post
  // Se il paragrafo contiene solo l'immagine, rimuovi l'intero <p>
  imgs.forEach(function(img) {
    var p = img.parentElement;
    if (p && p.tagName === 'P') {
      // clona il p senza l'img e controlla se rimane testo
      var clone = p.cloneNode(true);
      clone.querySelectorAll('img').forEach(function(i) { i.remove(); });
      if (clone.textContent.trim() === '') {
        p.remove();
        return;
      }
    }
    img.remove();
  });

  var total = imgData.length;
  var current = 0;

  // 3. Costruisci l'HTML della galleria
  var gallery = document.createElement('div');
  gallery.className = 'photo-gallery';

  // Header
  var header = document.createElement('div');
  header.className = 'gallery-header';
  header.innerHTML =
    '<span class="gallery-label">&#9654; Fotografie</span>' +
    '<span class="gallery-count" id="gal-count">' + (total > 1 ? '1 / ' + total : '') + '</span>';
  gallery.appendChild(header);

  // Stage (frecce + immagine)
  var stage = document.createElement('div');
  stage.className = 'gallery-stage';

  var btnPrev = document.createElement('button');
  btnPrev.className = 'gallery-btn gallery-btn--prev';
  btnPrev.innerHTML = '&#8592;';
  btnPrev.setAttribute('aria-label', 'Foto precedente');

  var track = document.createElement('div');
  track.className = 'gallery-track';
  track.id = 'gal-track';

  var btnNext = document.createElement('button');
  btnNext.className = 'gallery-btn gallery-btn--next';
  btnNext.innerHTML = '&#8594;';
  btnNext.setAttribute('aria-label', 'Foto successiva');

  stage.appendChild(btnPrev);
  stage.appendChild(track);
  stage.appendChild(btnNext);
  gallery.appendChild(stage);

  // Caption
  var caption = document.createElement('div');
  caption.className = 'gallery-caption';
  caption.id = 'gal-caption';
  gallery.appendChild(caption);

  // Dots
  var dotsWrap = document.createElement('div');
  dotsWrap.className = 'gallery-dots';
  dotsWrap.id = 'gal-dots';
  gallery.appendChild(dotsWrap);

  // Thumbnails
  var thumbsWrap = document.createElement('div');
  thumbsWrap.className = 'gallery-thumbs';
  thumbsWrap.id = 'gal-thumbs';
  gallery.appendChild(thumbsWrap);

  // 4. Popola slide, dot, thumbnail
  imgData.forEach(function(data, i) {
    // Slide
    var slide = document.createElement('div');
    slide.className = 'gallery-slide' + (i === 0 ? ' is-active' : '');
    var si = document.createElement('img');
    si.src = data.src;
    si.alt = data.alt;
    si.loading = 'lazy';
    slide.appendChild(si);
    track.appendChild(slide);

    // Dot
    var dot = document.createElement('button');
    dot.className = 'gallery-dot' + (i === 0 ? ' is-active' : '');
    dot.setAttribute('aria-label', 'Vai alla foto ' + (i + 1));
    dot.addEventListener('click', function() { goTo(i); });
    dotsWrap.appendChild(dot);

    // Thumb
    var thumb = document.createElement('button');
    thumb.className = 'gallery-thumb' + (i === 0 ? ' is-active' : '');
    thumb.setAttribute('aria-label', 'Vai alla foto ' + (i + 1));
    var ti = document.createElement('img');
    ti.src = data.src;
    ti.alt = data.alt;
    ti.loading = 'lazy';
    thumb.appendChild(ti);
    thumb.addEventListener('click', function() { goTo(i); });
    thumbsWrap.appendChild(thumb);
  });

  // Nascondi controlli se foto singola
  if (total <= 1) {
    btnPrev.style.display = 'none';
    btnNext.style.display = 'none';
    dotsWrap.style.display = 'none';
    thumbsWrap.style.display = 'none';
  }

  // 5. Funzione di navigazione
  function goTo(index) {
    var slides = track.querySelectorAll('.gallery-slide');
    var dots   = dotsWrap.querySelectorAll('.gallery-dot');
    var thumbs = thumbsWrap.querySelectorAll('.gallery-thumb');
    var count  = document.getElementById('gal-count');
    var cap    = document.getElementById('gal-caption');

    slides[current].classList.remove('is-active');
    dots[current].classList.remove('is-active');
    thumbs[current].classList.remove('is-active');

    current = (index + total) % total;

    slides[current].classList.add('is-active');
    dots[current].classList.add('is-active');
    thumbs[current].classList.add('is-active');
    thumbs[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

    if (count) count.textContent = (current + 1) + ' / ' + total;

    var alt = imgData[current].alt;
    if (cap) {
      cap.textContent = alt;
      cap.style.display = alt ? 'block' : 'none';
    }
  }

  btnPrev.addEventListener('click', function() { goTo(current - 1); });
  btnNext.addEventListener('click', function() { goTo(current + 1); });

  // Navigazione da tastiera
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // Swipe su touch
  var touchX = 0;
  track.addEventListener('touchstart', function(e) {
    touchX = e.touches[0].clientX;
  }, { passive: true });
  track.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
  });

  // Imposta caption iniziale
  var initCap = document.getElementById('gal-caption');
  if (initCap) {
    initCap.textContent = imgData[0].alt;
    initCap.style.display = imgData[0].alt ? 'block' : 'none';
  }

  // 6. Monta la galleria nella pagina
  mount.appendChild(gallery);
})();
</script>
